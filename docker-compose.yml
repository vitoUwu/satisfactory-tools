name: satisfactory-tools

services:
  web:
    image: ghcr.io/vitouwu/satisfactory-tools:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    init: true
    ports:
      - "3001:3001"
    env_file:
      - path: apps/web/.env
        required: false
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
